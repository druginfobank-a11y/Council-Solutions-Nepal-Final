
<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>Council Solutions Nepal</title>
    
    <!-- PWA Primary Metadata -->
    <meta name="theme-color" content="#020617">
    <meta name="description" content="Premium LMS for Nepalese council exam preparation.">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" href="/logo-192.png">
    
    <!-- iOS / Safari Support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CSN Nepal">
    <link rel="apple-touch-icon" href="/logo-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Theme initialization
        tailwind.config = { darkMode: 'class' }
        const savedTheme = localStorage.getItem('csn_theme');
        if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <style>
        :root {
            --safe-area-inset-top: env(safe-area-inset-top, 0px);
            --safe-area-inset-bottom: env(safe-area-inset-bottom, 0px);
        }
        html, body {
            overscroll-behavior-y: none;
            height: 100%;
            background-color: #020617; 
            color: #0f172a;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }
        #root { height: 100%; display: flex; flex-direction: column; overflow: hidden; width: 100%; }
        
        .animate-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        
        @keyframes ticker {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        @keyframes viva-pulse {
            0%, 100% { transform: scaleY(1); opacity: 0.5; }
            50% { transform: scaleY(2.2); opacity: 1; }
        }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        
        /* Professional Mobile Drawer Interaction */
        .drawer-overlay {
            transition: opacity 0.4s cubic-bezier(0.32, 0.72, 0, 1);
            pointer-events: none;
            opacity: 0;
            z-index: 40;
        }
        .drawer-overlay.active {
            pointer-events: auto;
            opacity: 1;
        }
        
        .mobile-drawer {
            transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1);
            transform: translateX(-100%);
            z-index: 50;
            will-change: transform;
        }
        .mobile-drawer.active {
            transform: translateX(0);
        }

        .main-content-card {
            transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1), opacity 0.5s ease;
            height: 100%;
            overflow: hidden;
            position: relative;
            z-index: 10;
        }
        
        /* Subtle parallax when drawer is open */
        .main-content-card.pushed {
            transform: translateX(20px) scale(0.98);
            opacity: 0.6;
            pointer-events: none;
        }

        @media (min-width: 768px) {
            .main-content-card.pushed {
                transform: none;
                opacity: 1;
                pointer-events: auto;
            }
        }
    </style>
<link rel="stylesheet" href="/index.css">
</head>
<body class="h-full antialiased selection:bg-blue-500/20">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
